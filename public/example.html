<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HA-Corr Property Automation</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 820px; margin: 48px auto; padding: 0 20px; }
    section { border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    input, button { font-size: 16px; padding: 10px; margin: 4px; }
    input[type=text] { width: 65%; }
    pre { background: #f4f4f4; padding: 16px; overflow: auto; max-height: 420px; }
  </style>
</head>
<body>
  <h1>HA-Corr Property Automation</h1>

  <section>
    <h2>Address to Acreage</h2>
    <form id="acreage-form">
      <input id="address" type="text" required placeholder="123 Main St, Atlanta, GA 30303" />
      <button type="submit">Find Acreage</button>
    </form>
    <pre id="acreage-output">Enter an address.</pre>
  </section>

  <section>
    <h2>Nearby Parcels</h2>
    <form id="nearby-form">
      <input id="latitude" type="number" step="any" required placeholder="Latitude" />
      <input id="longitude" type="number" step="any" required placeholder="Longitude" />
      <input id="radius" type="number" step="0.1" min="0.1" value="0.5" />
      <button type="submit">Find Nearby</button>
    </form>
    <pre id="nearby-output">Enter coordinates.</pre>
  </section>

  <script>
    const request = async (url, options) => {
      const response = await fetch(url, options);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "Request failed.");
      return data;
    };

    document.getElementById("acreage-form").addEventListener("submit", async event => {
      event.preventDefault();
      const output = document.getElementById("acreage-output");
      output.textContent = "Looking up parcel...";
      try {
        const data = await request("http://localhost:3000/api/v1/properties/acreage", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ address: document.getElementById("address").value })
        });
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) { output.textContent = error.message; }
    });

    document.getElementById("nearby-form").addEventListener("submit", async event => {
      event.preventDefault();
      const output = document.getElementById("nearby-output");
      output.textContent = "Searching nearby parcels...";
      try {
        const params = new URLSearchParams({
          latitude: document.getElementById("latitude").value,
          longitude: document.getElementById("longitude").value,
          radiusMiles: document.getElementById("radius").value,
          limit: "100"
        });
        const data = await request(`http://localhost:3000/api/v1/properties/nearby?${params}`);
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) { output.textContent = error.message; }
    });
  </script>
</body>
</html>
