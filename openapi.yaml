      responses: *id015
  /api/v1/surveillance/quote:
    post:
      tags: *id013
      summary: Create a complete surveillance quote and invoice
      description: Submits category, business pricing, tax settings, customer/property
        answers, and optional line items in one request. Runs category automations
        and returns a detailed draft invoice.
      requestBody: *id014
      responses: *id015
  /api/v1/trash-removal/quote:
    post:
      tags: *id013
      summary: Create a complete trash-removal quote and invoice
      description: Submits category, business pricing, tax settings, customer/property
        answers, and optional line items in one request. Runs category automations
        and returns a detailed draft invoice.
      requestBody: *id014
      responses: *id015
  /api/v1/transportation/quote:
    post:
      tags: *id013
      summary: Create a complete transportation quote and invoice
      description: Submits category, business pricing, tax settings, customer/property
        answers, and optional line items in one request. Runs category automations
        and returns a detailed draft invoice.
      requestBody: *id014
      responses: *id015
  /api/v1/ai/status:
    get:
      tags:
      - AI Orchestrator
      summary: Return AI provider status
      security:
      - ClientApiKey: []
      responses:
        '200':
          description: AI status
  /api/v1/ai/start:
    post:
      tags:
      - AI Orchestrator
      summary: Start an AI-first guided service workflow
      description: Authenticates the caller, lets AI classify the service category
        unless category is supplied, recommends approved internal APIs, creates a
        guided session, and returns the first question.
      security:
      - ClientApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: The upstairs HVAC runs but does not cool.
                category:
                  type: string
                  nullable: true
                start:
                  type: object
                  additionalProperties: true
              required:
              - message
      responses:
        '201':
          description: AI workflow created
        '400':
          description: Category could not be determined
        '401':
          description: Invalid client API key
  /api/v1/ai/chat:
    post:
      tags:
      - AI Orchestrator
      summary: Continue an AI-guided workflow or create its invoice
      security:
      - ClientApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                action:
                  type: string
                  enum:
                  - answer
                  - run-api
                  - invoice
                  default: answer
                message:
                  type: string
                value: {}
                endpointType:
                  type: string
                payload:
                  type: object
                invoice:
                  type: object
              required:
              - sessionId
      responses:
        '200':
          description: Workflow continued
        '401':
          description: Invalid client API key
components:
  schemas:
    ApiVersion:
      type: object
      required:
      - name
      - class
      - codename
      - semver
      - apiPath
      - status
      properties:
        name:
          type: string
          example: Class 0.5 Coaxium
        class:
          type: string
          example: '0.5'
        codename:
          type: string
          example: Coaxium
        semver:
          type: string
          example: 0.5.0
        apiPath:
          type: string
          example: v1
        status:
          type: string
          example: current
        releasedAt:
          type: string
          format: date
        description:
          type: string
        highlights:
          type: array
          items:
            type: string
        links:
          type: object
          additionalProperties:
            type: string
    ApiVersionCatalog:
      type: object
      required:
      - current
      - apiPath
      - count
      - versions
      properties:
        current:
          type: string
          example: Class 0.5 Coaxium
        apiPath:
          type: string
          example: v1
        count:
          type: integer
          example: 1
        versions:
          type: array
          items:
            $ref: '#/components/schemas/ApiVersion'
    CategorySummary:
      type: object
      required:
      - category
      - label
      - description
      - namespace
      properties:
        category:
          type: string
          example: transportation
        label:
          type: string
          example: Transportation
        description:
          type: string
          example: Local moves, long-haul and delivery quoting, load planning, route
            optimization, fleet capacity, and dispatch.
        namespace:
          type: string
          example: /api/v1/transportation
        endpoints:
          type: object
          properties:
            start:
              type: string
            quote:
              type: string
            sessions:
              type: string
        recommendedApis:
          type: array
          items:
            type: string
    CategoryCatalog:
      type: object
      required:
      - count
      - categories
      properties:
        count:
          type: integer
          example: 13
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategorySummary'
    GenericRequest:
      type: object
      additionalProperties: true
    AutomationResponse:
      type: object
      properties:
        requestId:
          type: string
        type:
          type: string
        generatedAt:
          type: string
          format: date-time
        input:
          type: object
        data:
          type: object
        meta:
          type: object
    GuidedStartRequest:
      type: object
      properties:
        prefill:
          type: object
          additionalProperties: true
        taxRate:
          type: number
          default: 0
        discount:
          type: number
          default: 0
        currency:
          type: string
          default: USD
        paymentTerms:
          type: string
          default: Due upon receipt
    GuidedAnswerRequest:
      type: object
      required:
      - value
      properties:
        value:
          description: Answer matching the nextQuestion type. May be a string, number,
            date, or object.
    GuidedSession:
      type: object
      properties:
        sessionId:
          type: string
        category:
          type: string
        categoryLabel:
          type: string
        status:
          type: string
          enum:
          - in_progress
          - ready_for_invoice
          - completed
        progress:
          type: object
        nextQuestion:
          nullable: true
          type: object
        answers:
          type: object
          additionalProperties: true
        apiResults:
          type: array
          items:
            type: object
        invoice:
          nullable: true
          $ref: '#/components/schemas/Invoice'
        links:
          type: object
    InvoiceLineItem:
      type: object
      required:
      - description
      - quantity
      - unitPrice
      - amount
      properties:
        description:
          type: string
        quantity:
          type: number
        unit:
          type: string
        unitPrice:
          type: number
        amount:
          type: number
        sourceApi:
          type: string
        sourceRequestId:
          type: string
    InvoiceOverride:
      type: object
      properties:
        invoiceNumber:
          type: string
        taxRate:
          type: number
        discount:
          type: number
        currency:
          type: string
        paymentTerms:
          type: string
        notes:
          type: string
        additionalLineItems:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLineItem'
    Invoice:
      type: object
      properties:
        invoiceId:
          type: string
        invoiceNumber:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        currency:
          type: string
        category:
          type: string
        categoryLabel:
          type: string
        customer:
          type: object
        serviceAddress:
          type: string
        serviceDate:
          type: string
          nullable: true
        paymentTerms:
          type: string
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLineItem'
        subtotal:
          type: number
        discount:
          type: number
        taxRate:
          type: number
        tax:
          type: number
        total:
          type: number
        notes:
          type: string
        workflow:
          type: object
          description: Complete answers and API results used to generate the invoice.
  securitySchemes:
    ClientApiKey:
      type: apiKey
      in: header
      name: X-API-Key
