openapi: 3.0.3
info:
  title: HA-Corr Automation Multi-Trade API
  version: 0.5.0
  description: 'Class 0.5 Coaxium. Industry-specific automation APIs for landscape,
    HVAC, cleaning, pest control, pool service, painting, roofing, plumbing, electrical,
    general contracting, surveillance, trash removal, and transportation. Starter
    calculations must be verified by licensed professionals and connected providers
    before production decisions. Guided start sessions ask category-specific questions,
    execute trade APIs, retain all results, and generate invoice-ready JSON.'
  x-api-class: '0.5'
  x-api-codename: Coaxium
  x-api-version-name: Class 0.5 Coaxium
servers:
- url: http://localhost:3000/api/v1
tags:
- name: Deprecated
- name: Electrical
- name: General Contracting
- name: HVAC & Mechanical
- name: Janitorial & Cleaning
- name: Landscape
- name: Marketplace
- name: Painting
- name: Pest Control
- name: Plumbing
- name: Pool Service
- name: Roofing
- name: Shared Business
- name: Shared Customers
- name: Shared Fleet
- name: Shared Mapping
- name: Shared Sales
- name: Surveillance
- name: Trash Removal
- name: Transportation
- name: Guided Workflows
- name: Categories
- name: Versioning
- name: Invoices
paths:
  /version:
    get:
      tags:
      - Versioning
      summary: Get current API Class version
      description: Returns the current release Class, codename, semver, path version,
        and highlights for Class 0.5 Coaxium.
      operationId: get_version
      responses:
        '200':
          description: Current API version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiVersion'
              example:
                name: Class 0.5 Coaxium
                class: '0.5'
                codename: Coaxium
                semver: 0.5.0
                apiPath: v1
                status: current
  /versions:
    get:
      tags:
      - Versioning
      summary: List API Class versions
      description: Returns the release history of HA-Corr API Classes and codenames.
      operationId: list_versions
      responses:
        '200':
          description: Version catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiVersionCatalog'

  /landscape/properties/search:
    post:
      tags:
      - Landscape
      summary: Property Search
      description: Runs the property search operation. Review the response metadata
        for provider or professional-verification requirements.
      operationId: property_search_post
      responses:
        '200':
          description: Successful automation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationResponse'
              example:
                requestId: req_example
                type: property-search
                generatedAt: '2026-07-17T12:00:00.000Z'
                input:
                  address: 123 Main St, Atlanta, GA 30303
                  propertyType: residential
                  squareFeet: 2500
                data:
                  status: starter-calculation
                  suggestedPrice: 1250
                  confidence: 0.7
                meta:
                  mode: starter-calculation
        '400':
          description: Invalid input
        '500':
          description: Integration or server error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericRequest'
            example:
              address: 123 Main St, Atlanta, GA 30303
              propertyType: residential
              squareFeet: 2500
